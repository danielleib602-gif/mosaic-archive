name: Coverage-guided fuzzing

on:
  pull_request:
    paths:
      - "src/mosaic_archive/coverage_fuzzing.py"
      - "src/mosaic_archive/reliability.py"
      - "fuzz/**"
      - "tests/test_coverage_fuzzing.py"
      - ".github/workflows/coverage-fuzz.yml"
  workflow_dispatch:
  schedule:
    - cron: "23 1 * * 3"

permissions:
  contents: read

jobs:
  atheris:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - run: uv sync --frozen
      - run: uv run --frozen python -m mosaic_archive.coverage_fuzzing fuzz-corpus
      - run: >
          uv run --frozen --with atheris==3.1.0 python fuzz/atheris_mosaic.py
          fuzz-corpus -max_total_time=300 -rss_limit_mb=2048 -timeout=10
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: mosaic-coverage-fuzz-${{ github.sha }}
          path: |
            fuzz-corpus
            crash-*
            timeout-*
            oom-*
          if-no-files-found: warn
