name: Reproducible benchmark

on:
  pull_request:
    paths:
      - "src/mosaic_archive/benchmark_publication.py"
      - "src/mosaic_archive/benchmark.py"
      - "src/mosaic_archive/comparisons.py"
      - "src/mosaic_archive/corpus.py"
      - "src/mosaic_archive/cdc.py"
      - "src/mosaic_archive/solid_archive_v2.py"
      - "src/mosaic_archive/solid_frames.py"
      - "src/mosaic_archive/solid_research.py"
      - "tests/test_benchmark_publication.py"
      - "tests/test_corpus.py"
      - ".github/workflows/benchmark.yml"
  workflow_dispatch:
  schedule:
    - cron: "17 3 1 * *"

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: sudo apt-get update
      - run: sudo apt-get install --yes zstd p7zip-full
      - run: uv sync --frozen
      - run: uv run --frozen python -m mosaic_archive.corpus benchmark-corpus
      - run: >
          uv run --frozen python -m mosaic_archive.benchmark_publication
          benchmark-corpus published-benchmark --release 0.39.0
          --source-commit ${{ github.event.pull_request.head.sha || github.sha }}
          --kdf-log-n 14 --repeats 5 --format solid
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mosaic-benchmark-v0.39.0-${{ github.sha }}
          path: |
            benchmark-corpus/manifest.json
            published-benchmark/report.json
            published-benchmark/report.md
          if-no-files-found: error
