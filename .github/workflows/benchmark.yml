name: Reproducible benchmark

on:
  pull_request:
    paths:
      - "src/mosaic_archive/benchmark_publication.py"
      - "src/mosaic_archive/benchmark.py"
      - "src/mosaic_archive/comparisons.py"
      - "src/mosaic_archive/corpus.py"
      - "tests/test_benchmark_publication.py"
      - ".github/workflows/benchmark.yml"
  workflow_dispatch:
  schedule:
    - cron: "17 3 1 * *"

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: sudo apt-get update
      - run: sudo apt-get install --yes zstd p7zip-full
      - run: uv sync --frozen
      - run: uv run --frozen python -m mosaic_archive.corpus benchmark-corpus
      - run: >
          uv run --frozen python -m mosaic_archive.benchmark_publication
          benchmark-corpus published-benchmark --release 0.12.0
          --source-commit ${{ github.event.pull_request.head.sha || github.sha }}
          --kdf-log-n 14
      - run: >
          uv run --frozen msc benchmark --format solid benchmark-corpus
          --padding-size 256 --kdf-log-n 14
          --password mosaic-public-encrypted-comparison
          --compare --json > solid-benchmark.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mosaic-benchmark-v0.12.0-${{ github.sha }}
          path: |
            benchmark-corpus/manifest.json
            published-benchmark/report.json
            published-benchmark/report.md
            solid-benchmark.json
          if-no-files-found: error
