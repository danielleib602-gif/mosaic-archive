name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.11"
          - os: ubuntu-latest
            python: "3.13"
          - os: windows-latest
            python: "3.11"
          - os: windows-latest
            python: "3.13"
          - os: macos-latest
            python: "3.13"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python }}
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - run: uv run --frozen python -m unittest discover -s tests -v

  quality-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv sync --frozen --extra dev --extra release
      - run: uv run --frozen ruff check .
      - run: uv run --frozen mypy src
      - run: uv run --frozen --with coverage coverage run -m unittest discover -s tests
      - run: uv run --frozen --with coverage coverage report --fail-under=80
      - run: uv run --frozen --with bandit==1.9.4 bandit -q -r src -lll
      - run: uv run --frozen --with pip-audit pip-audit --local
      - run: uv run --frozen msc readiness --require-automatic --json
      - run: uv build
      - run: uv run --frozen python -m mosaic_archive.corpus .ci-corpus --unit-size 4096
