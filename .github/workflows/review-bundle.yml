name: Independent review bundle

on:
  pull_request:
    paths:
      - "src/**"
      - "scripts/prepare_review_bundle.py"
      - "tests/test_review_bundle.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/review-bundle.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: deterministic source evidence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"
      - name: Build bundle from the checked-out Git commit
        shell: bash
        run: >
          python scripts/prepare_review_bundle.py build
          "review/mosaic-review-${GITHUB_SHA}.zip"
          --revision "$GITHUB_SHA"
      - name: Verify every bundled payload
        shell: bash
        run: >
          python scripts/prepare_review_bundle.py verify
          "review/mosaic-review-${GITHUB_SHA}.zip"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mosaic-review-${{ github.sha }}
          path: review/mosaic-review-*.zip
          if-no-files-found: error
