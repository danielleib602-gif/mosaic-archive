name: Cross-platform release binaries

on:
  pull_request:
    paths:
      - "src/**"
      - "scripts/prepare_release_binary.py"
      - "scripts/prepare_review_bundle.py"
      - "tests/test_release_binaries.py"
      - "tests/test_release_readiness.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/release.yml"
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish_candidate:
        description: Publish an attested prerelease candidate from this exact commit
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  preflight:
    name: Release policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Require published candidate to be current protected main
        if: github.event_name == 'workflow_dispatch' && inputs.publish_candidate
        shell: bash
        run: |
          git fetch --no-tags origin main
          test "$GITHUB_SHA" = "$(git rev-parse FETCH_HEAD)"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: Require repository gates for non-stable builds
        if: >-
          ${{ !startsWith(github.ref, 'refs/tags/') ||
              startsWith(github.ref, 'refs/tags/v0.') }}
        run: uv run --frozen msc readiness --require-automatic --json
      - name: Require candidate-bound evidence for stable releases
        if: >-
          ${{ startsWith(github.ref, 'refs/tags/') &&
              !startsWith(github.ref, 'refs/tags/v0.') }}
        run: >-
          uv run --frozen msc readiness
          --release-tag "$GITHUB_REF_NAME"
          --release-commit "$GITHUB_SHA"
          --require-ready --json

  build:
    name: ${{ matrix.os }} binary
    needs: preflight
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: Build native one-file executable
        run: >
          uv run --frozen --with pyinstaller==6.21.0 pyinstaller
          --clean --noconfirm --onefile --noupx --paths src
          --name msc src/mosaic_archive/__main__.py
      - name: Name and smoke-test executable
        run: >
          uv run --frozen python scripts/prepare_release_binary.py
          dist/msc release --expected-version 0.39.0
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mosaic-${{ runner.os }}-${{ runner.arch }}
          path: release/msc-*
          if-no-files-found: error

  publish:
    name: Attest and publish release
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_candidate)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Require tag to match the package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          PACKAGE_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          test "$GITHUB_REF_NAME" = "v$PACKAGE_VERSION"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: release
          merge-multiple: true
      - name: Export stable release evidence
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: >-
          git for-each-ref --format='%(contents)'
          "refs/tags/${GITHUB_REF_NAME}" > release/RELEASE-EVIDENCE.json
      - name: Build and verify deterministic source review bundle
        shell: bash
        run: |
          python scripts/prepare_review_bundle.py build "release/mosaic-review-${GITHUB_SHA}.zip" --revision "$GITHUB_SHA"
          python scripts/prepare_review_bundle.py verify "release/mosaic-review-${GITHUB_SHA}.zip"
      - name: Generate checksums
        working-directory: release
        shell: bash
        run: |
          files=(msc-* mosaic-review-*.zip)
          if [[ -f RELEASE-EVIDENCE.json ]]; then
            files+=(RELEASE-EVIDENCE.json)
          fi
          sha256sum "${files[@]}" > SHA256SUMS
      - name: Sign SLSA build provenance with Sigstore
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-checksums: release/SHA256SUMS
      - name: Publish immutable stable release assets
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" release/* --verify-tag --generate-notes
      - name: Publish immutable candidate release assets
        if: github.event_name == 'workflow_dispatch' && inputs.publish_candidate
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          PACKAGE_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          CANDIDATE_TAG="candidate-v${PACKAGE_VERSION}-${GITHUB_SHA::12}"
          gh release create "$CANDIDATE_TAG" release/* \
            --target "$GITHUB_SHA" \
            --prerelease \
            --title "Mosaic Archive v${PACKAGE_VERSION} candidate ${GITHUB_SHA::12}" \
            --notes "Attested candidate built from ${GITHUB_SHA} for independent review."
