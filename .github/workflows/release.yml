name: Cross-platform release binaries

on:
  pull_request:
    paths:
      - "src/**"
      - "scripts/prepare_release_binary.py"
      - "tests/test_release_binaries.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/release.yml"
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os }} binary
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: Build native one-file executable
        run: >
          uv run --frozen --with pyinstaller==6.21.0 pyinstaller
          --clean --noconfirm --onefile --noupx --paths src
          --name msc src/mosaic_archive/__main__.py
      - name: Name and smoke-test executable
        run: >
          uv run --frozen python scripts/prepare_release_binary.py
          dist/msc release --expected-version 0.21.0
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mosaic-${{ runner.os }}-${{ runner.arch }}
          path: release/msc-*
          if-no-files-found: error

  publish:
    name: Attest and publish tagged release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Require tag to match the package version
        shell: bash
        run: |
          PACKAGE_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          test "$GITHUB_REF_NAME" = "v$PACKAGE_VERSION"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: release
          merge-multiple: true
      - name: Generate checksums
        working-directory: release
        run: sha256sum msc-* > SHA256SUMS
      - name: Sign SLSA build provenance with Sigstore
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: release/SHA256SUMS
      - name: Publish immutable release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" release/* --verify-tag --generate-notes
