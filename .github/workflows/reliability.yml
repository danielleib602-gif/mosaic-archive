name: Sustained reliability

on:
  pull_request:
    paths:
      - "src/mosaic_archive/reliability.py"
      - "tests/test_reliability.py"
      - ".github/workflows/reliability.yml"
  workflow_dispatch:
  schedule:
    - cron: "41 2 * * 0"

permissions:
  contents: read

jobs:
  fuzz-and-soak:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - run: uv sync --frozen
      - run: uv run --frozen python -m mosaic_archive.reliability fuzz --seed 20260629 --cases 10000
      - run: uv run --frozen python -m mosaic_archive.reliability soak --seed 20260629 --size-mib 256
