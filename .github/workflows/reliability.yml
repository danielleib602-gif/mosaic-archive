name: Sustained reliability

on:
  pull_request:
    paths:
      - "src/mosaic_archive/reliability.py"
      - "tests/test_reliability.py"
      - ".github/workflows/reliability.yml"
  workflow_dispatch:
  schedule:
    - cron: "41 2 * * 0"

permissions:
  contents: read

jobs:
  fuzz-and-soak:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uv sync --frozen
      - run: uv run --frozen python -m mosaic_archive.reliability fuzz --seed 20260629 --cases 10000
      - run: uv run --frozen python -m mosaic_archive.reliability soak --seed 20260629 --size-mib 256
